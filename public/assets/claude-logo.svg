<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 139 40" fill="none">
  <!-- Claude Logo - Official Anthropic Style -->
  <defs>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="50%" style="stop-color:#C49B6A"/>
      <stop offset="100%" style="stop-color:#A67C52"/>
    </linearGradient>
  </defs>

  <!-- Claude Icon (Simplified Anthropic style) -->
  <g transform="translate(0, 2)">
    <!-- A-shape with inner pattern -->
    <path d="M15 2L29 34H1L15 2Z" fill="url(#claudeGrad)"/>
    <!-- Inner highlight -->
    <path d="M15 8L23 26H7L15 8Z" fill="white" fill-opacity="0.25"/>
    <!-- Horizontal bar -->
    <path d="M8 20L22 20L22 24L8 24L8 20Z" fill="white" fill-opacity="0.4"/>
  </g>

  <!-- Claude Text - Official style -->
  <text x="38" y="26" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#8B6914">Claude</text>

  <!-- Anthropic attribution -->
  <text x="102" y="26" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="400" fill="#A67C52" opacity="0.8">by Anthropic</text>
</svg>